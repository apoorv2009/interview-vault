<div class="app-shell">

  <!-- SIDEBAR NAV — concepts are added here as we build them -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="logo-text">Angular</div>
      <div class="logo-sub">Interview Prep</div>
    </div>

    <div class="nav-section-label">Concepts</div>
    <ul class="concept-nav">
      @for (concept of concepts; track concept.route) {
        <li>
          <a [routerLink]="concept.route" routerLinkActive="active">
            <span class="num">#{{ concept.number }}</span>
            <span class="name">{{ concept.name }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- MAIN CONTENT — router swaps concept pages here -->
  <main class="main-content">
    <router-outlet />
  </main>

</div>
